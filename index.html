function UsersPage({db,update}){const{user:me}=useAuth();const{ask,dialog}=useConfirm();const[modal,setModal]=useState(null);const[form,setForm]=useState({});const[showPass,setShowPass]=useState(false);const[busy,setBusy]=useState(false);const[err,setErr]=useState('');const setF=(k,v)=>setForm(f=>({...f,[k]:v}));const open=(u=null)=>{setForm(u?{...u}:{id:uid(),email:'',password:'',name:'',role:'manager',createdAt:now()});setShowPass(false);setErr('');setModal(u?'edit':'create');};const validate=()=>{if(!form.name.trim()){setErr('Введите имя');return false;}if(modal==='create'){if(!form.email||!form.email.trim()){setErr('Введите email');return false;}if(!form.password||form.password.length<6){setErr('Пароль минимум 6 символов');return false;}if(db.users.find(u=>(u.email||'').toLowerCase()===form.email.trim().toLowerCase())){setErr('Этот email уже занят');return false;}}

const save=async()=>{
  setErr('');if(!validate())return;
  if(modal==='create'){
    if(!_fbAuth){setErr('Firebase Auth недоступен');return;}
    setBusy(true);
    try{
      // ВНИМАНИЕ: createUserWithEmailAndPassword автоматически залогинит нового юзера,
      // выкинув текущего админа. Поэтому после создания делаем signOut и просим админа войти заново.
      const cred=await _fbAuth.createUserWithEmailAndPassword(form.email.trim(),form.password);
      const newProf={id:form.id,authUid:cred.user.uid,email:form.email.trim(),login:form.email.trim(),name:form.name.trim(),role:form.role,createdAt:now()};
      // Перед signOut админа добавим профиль в db.users (под текущей сессией, пока есть права)
      update('users',us=>[...us,newProf]);
      // Подождём пока запрос уйдёт
      await new Promise(r=>setTimeout(r,800));
      // Выходим — Firebase автоматически залогинил нового, а нам нужен админ
      await _fbAuth.signOut();
      alert('Пользователь создан: '+newProf.email+'\nВойдите снова под своим аккаунтом.');
      window.location.reload();
    }catch(ex){
      setBusy(false);
      const code=ex&&ex.code||'';
      if(code==='auth/email-already-in-use')setErr('Этот email уже зарегистрирован в Firebase');
      else if(code==='auth/invalid-email')setErr('Неверный формат email');
      else if(code==='auth/weak-password')setErr('Слишком слабый пароль (минимум 6 символов)');
      else setErr('Ошибка: '+(ex&&ex.message||code));
    }
    return;
  }
  // Редактирование — обновляем имя, роль, email (для миграции старых записей).
  // Email тут сохраняется только в db.users — для связи с Firebase Auth учёткой.
  // В Firebase Auth email меняется через Console (через клиент нельзя без переавторизации).
  update('users',us=>us.map(x=>x.id===form.id?{...x,name:form.name.trim(),role:form.role,email:(form.email||'').trim()||x.email,employeeId:form.employeeId||null}:x));
  setModal(null);
};
